name: Compilation iOS Multiplateforme

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Récupérer le code du projet
        uses: actions/checkout@v4

      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # CORRECTION : On force l'utilisation de Gradle 8.5 directement ici
      - name: Configurer Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Donner les permissions d'exécution au script de compilation
        run: |
          if [ -f "gradlew" ]; then chmod +x gradlew; else cd masbaha2 && chmod +x gradlew; fi

      - name: Compiler le Framework pour iPhone
        run: |
          [ -f "gradlew" ] || cd masbaha2
          # Utilisation de --no-daemon pour stabiliser le premier téléchargement de Kotlin/Native
          ./gradlew :composeApp:iosX64Binaries --no-daemon

      - name: Archiver le Framework iOS pour le télécharger
        uses: actions/upload-artifact@v4
        with:
          name: Masbaha-iOS-Framework
          path: |
            **/build/bin/iosX64/
            **/build/cocoapods/framework/
