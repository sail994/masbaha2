# 1. Allocations Mémoire (Pour éviter le crash du Garbage Collector)
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+UseG1GC
kotlin.native.jvmArgs=-Xmx4g

# 2. Autorisations et Compatibilité (Requis par Compose et Room)
android.useAndroidX=true
kotlin.mpp.androidGradlePluginCompatibility.nowarn=true

# 3. Stabilisation du Build (Désactivation du cache de configuration défaillant)
org.gradle.configuration-cache=false
