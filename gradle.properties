# Augmenter la mémoire globale pour le démon Gradle
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+UseG1GC

# Activer le nouveau moteur de configuration plus rapide
org.gradle.configuration-cache=true

# Forcer Kotlin/Native à utiliser plus de mémoire pour l'étape de lien (Linker)
kotlin.native.jvmArgs=-Xmx4g
